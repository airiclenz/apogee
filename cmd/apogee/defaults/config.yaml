# apogee configuration — ~/.apogee/config.yaml
#
# This file is created automatically on first run from a template compiled into the
# apogee binary. Your edits are preserved: apogee never overwrites an existing config.
#
# Settings resolve by precedence, highest first:
#
#   command-line flag  >  APOGEE_* environment variable  >  this file  >  built-in default
#
# Every line below is commented out, so out of the box this file changes nothing — it is
# a documented starting point. Uncomment a line and edit it to make it your default.

# The local OpenAI-compatible LLM server URL.
#   flag: --endpoint   env: APOGEE_ENDPOINT
# endpoint: http://192.168.64.1:1111

# A short, friendly name for the upstream host, shown in the status footer. Leave it unset
# and apogee shows the endpoint's host instead. Config-file only (no flag or env).
# host-alias: my-box

# The model name to request from that server. Leave it unset and apogee asks the server
# for its active model — a single-model server (e.g. llama.cpp's llama-server) needs only
# the endpoint above.
#   flag: --model      env: APOGEE_MODEL
# model: qwen2.5-coder

# Autonomy mode: how tool calls are gated (the privilege ladder, least to most autonomous).
#   plan        — read-only: no writes, no command execution
#   ask-before  — every write, command, and external reach needs your approval (the default)
#   allow-edits — Apogee's own workspace edits run without asking; shell/exec, network, MCP,
#                 and any out-of-workspace write still gate (needs no confinement)
#   auto        — also runs the unbounded shell/subprocess surface unsupervised, fenced by
#                 confine-to-workspace below; needs OS filesystem confinement on the host
#   flag: --mode       env: APOGEE_MODE
# mode: ask-before

# Auto's blast radius (only meaningful in --mode auto). GLOBAL-CONFIG-ONLY: there is no flag
# or env, and a project config cannot loosen it — editing THIS file is the deliberate
# acknowledgement. Default: true.
#   true   — filesystem writes are fenced to the workspace under OS confinement; the network
#            is open; MCP still asks. (The safe default.)
#   false  — "I am the sandbox": nothing is fenced and nothing asks, EXCEPT the dangerous-
#            action guard floor. Safe ONLY inside a VM/container — your responsibility. Prints
#            a warning every session.
# confine-to-workspace: true

# Search endpoint for the web_search tool. Default-OFF: with no endpoint set, web_search is
# offered to the model but reports that web search is unavailable (it never fails the turn).
# There is no hard-wired provider — point this at your own search backend, which receives the
# query as the `q` URL parameter. Config-file only (no flag or env). The SSRF floor (loopback,
# private, and metadata addresses are always blocked, by resolved IP) applies regardless.
# web-search-endpoint: https://search.example.com/search

# External MCP (Model Context Protocol) servers to connect on startup. Default-EMPTY: with no
# servers listed, the MCP feature is dormant (no connections, no error). Each server's tools are
# discovered at startup and offered to the model, named "<server-name>__<tool>". Config-file only.
#
# An MCP server is an EXTERNAL, untrusted process Apogee cannot confine — so its tools ALWAYS ask
# for approval in auto mode (confine-to-workspace: true), the same as any unfenceable reach. A
# server reached over http(s) (sse / streamable-http) passes the same SSRF floor as the network
# tools (loopback / private / metadata endpoints are refused). A stdio server is a local process
# you launch — you chose the command — so no URL floor applies; its tools still ask in auto.
#
# mcp-servers:
#   - name: github                       # the prefix on each tool's name; must be unique
#     transport: stdio                   # stdio | sse | streamable-http
#     command: github-mcp-server         # stdio: the executable to launch
#     args: ["--stdio"]                  # stdio: optional arguments
#     env: ["GITHUB_TOKEN=…"]            # stdio: optional KEY=VALUE environment entries
#   - name: docs
#     transport: streamable-http         # sse | streamable-http: a remote http(s) server
#     endpoint: https://mcp.example.com/ # the server URL (passes the SSRF floor)



# Run with Mechanisms off; the structural context reducers stay on (ADR 0006).
#   flag: --bypass     env: APOGEE_BYPASS
# bypass: false
